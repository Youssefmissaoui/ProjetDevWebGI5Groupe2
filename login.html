{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Connexion</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <button type="submit" class="btn btn-blue full">Se connecter</button>
    </form>
</div>
{% endblock %}
